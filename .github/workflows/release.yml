name: Build and Publish Release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Maven Run Configurations CI"]
    types:
      - completed
    branches:
      - main

jobs:
  release-and-publish:
    name: Release and Publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Generate Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          tag-prefix: "v"
          release-count: 0
          preset: conventionalcommits
          skip-on-empty: false
          skip-commit: true
          git-push: false

      - name: Bump Versions
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          echo "Bumping versions to $VERSION"
          jq --arg version "$VERSION" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg version "$VERSION" '.version = $version' package-lock.json > package-lock.json.tmp
          mv package-lock.json.tmp package-lock.json

      - name: Build VSIX
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          npm ci
          npm run vsix

      - name: Verify build output
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          if [ ! -f "dist/extension.js" ]; then
            echo "Error: dist/extension.js not found after build"
            exit 1
          fi
          VSIX_FILE=$(find . -maxdepth 1 -name "maven-run-configurations-*.vsix" -type f | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "Error: VSIX file not found after packaging"
            exit 1
          fi

      - name: Prepare release artifacts
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          cp "maven-run-configurations-${VERSION}.vsix" maven-run-configurations.vsix

      - name: Commit version bump
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): bump version to ${{ steps.changelog.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            maven-run-configurations-${{ steps.changelog.outputs.version }}.vsix
            maven-run-configurations.vsix
          draft: false
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
          body: |
            **Maven Run Configurations** — IntelliJ-style Maven run configurations in the bottom panel for Cursor and VS Code.

            Repository: [siegfriedbolz/cursor-maven-runconfigurations](https://github.com/siegfriedbolz/cursor-maven-runconfigurations)

            ## Changelog

            ${{ steps.changelog.outputs.clean_changelog }}

            ## Installation

            1. Download **`maven-run-configurations.vsix`** from the assets below.
            2. In **Cursor** or **VS Code**, open the Extensions view (**Ctrl+Shift+X** / **Cmd+Shift+X**).
            3. Open the **⋯** menu → **Install from VSIX…** and select the file.

      - name: Resolve marketplace publish flags
        id: registry_pats
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          if [ -n "$OPEN_VSX_TOKEN" ]; then
            echo "openvsx=true" >> "$GITHUB_OUTPUT"
          else
            echo "openvsx=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$VS_MARKETPLACE_TOKEN" ]; then
            echo "vsmarket=true" >> "$GITHUB_OUTPUT"
          else
            echo "vsmarket=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}

      - name: Publish to Open VSX Registry
        if: ${{ steps.changelog.outputs.skipped == 'false' && steps.registry_pats.outputs.openvsx == 'true' }}
        uses: HaaLeo/publish-vscode-extension@v2
        id: publishToOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          baseImagesUrl: "https://github.com/siegfriedbolz/cursor-maven-runconfigurations"
          packagePath: "."

      - name: Publish to Visual Studio Marketplace
        if: ${{ steps.changelog.outputs.skipped == 'false' && steps.registry_pats.outputs.vsmarket == 'true' }}
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: maven-run-configurations-${{ steps.changelog.outputs.version }}.vsix
          baseImagesUrl: "https://github.com/siegfriedbolz/cursor-maven-runconfigurations"
          packagePath: "."

      - name: Skip marketplace publish (no PAT)
        if: ${{ steps.changelog.outputs.skipped == 'false' && steps.registry_pats.outputs.openvsx == 'false' && steps.registry_pats.outputs.vsmarket == 'false' }}
        run: |
          echo "Skipping Open VSX and Visual Studio Marketplace: set repository secrets OPEN_VSX_TOKEN and/or VS_MARKETPLACE_TOKEN to publish. GitHub Release assets were still uploaded."
